<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="1.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="30" fill="#0a0a0f" />
  <path d="M 35 60 C 35 40, 55 40, 60 60 C 65 80, 85 80, 85 60 C 85 40, 65 40, 60 60 C 55 80, 35 80, 35 60" 
        stroke="url(#aurora)" stroke-width="12" fill="none" stroke-linecap="round" filter="url(#glow)" />
</svg>
